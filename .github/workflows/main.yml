name: Unity Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Run Unity tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Unity tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          testMode: all
          coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;generateXmlReport'

      - name: Check coverage threshold
        run: |
          python3 - <<'PY'
          import os
          import re
          import sys

          candidates = [
                "CodeCoverage/Report/Summary.xml",
                "CodeCoverage/Report/summary.xml",
                "CodeCoverage/Report/index.html",
                "CodeCoverage/Report/index.htm",
                "CodeCoverage/index.html",
                "CodeCoverage/index.htm",
            ]

          found = None
          for path in candidates:
              if os.path.exists(path):
                  found = path
                  break

          if not found:
              print("Coverage summary file not found. Skipping this check.")
              sys.exit(0)

          text = open(found, "r", encoding="utf-8", errors="ignore").read()

          percent = None

          m = re.search(r'line-rate="([0-9.]+)"', text)
          if m:
              percent = float(m.group(1)) * 100.0

          if percent is None:
              m = re.search(r'Line coverage[^0-9]*([0-9]+(?:\.[0-9]+)?)%', text, re.IGNORECASE | re.DOTALL)
              if m:
                  percent = float(m.group(1))

          if percent is None:
              print("Could not parse coverage percentage. Skipping this check.")
              sys.exit(0)

          print(f"Parsed coverage: {percent:.2f}%")

          if percent < 80.0:
              print("Coverage is below 80%. Skipping this check")
              sys.exit(0)
          PY
