name: Unity Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Run Unity tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Unity tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          testMode: all
          coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;generateXmlReport'

      - name: Check coverage threshold
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import sys
          import xml.etree.ElementTree as ET

          threshold = 80.0
          coverage_root = Path("CodeCoverage")

          def parse_reportgenerator_summary(path):
              root = ET.parse(path).getroot()
              line_coverage = root.findtext("./Summary/Linecoverage")
              if line_coverage is not None:
                  return float(line_coverage)
              covered = root.findtext("./Summary/Coveredlines")
              coverable = root.findtext("./Summary/Coverablelines")
              if covered is not None and coverable is not None and float(coverable) > 0:
                  return float(covered) / float(coverable) * 100.0
              return None

          def parse_opencover_summary(paths):
              visited = 0
              total = 0
              for path in paths:
                  root = ET.parse(path).getroot()
                  summary = root.find("./Summary")
                  if summary is None:
                      continue
                  visited += int(summary.attrib.get("visitedSequencePoints", 0))
                  total += int(summary.attrib.get("numSequencePoints", 0))

              if total == 0:
                  return None
              return visited / total * 100.0

          percent = None
          source = None

          summary_candidates = [
              coverage_root / "Report" / "Summary.xml",
              coverage_root / "Report" / "summary.xml",
          ]
          for candidate in summary_candidates:
              if candidate.exists():
                  percent = parse_reportgenerator_summary(candidate)
                  source = str(candidate)
                  break

          if percent is None:
              opencover_files = sorted(coverage_root.glob("**/TestCoverageResults_*.xml"))
              if opencover_files:
                  percent = parse_opencover_summary(opencover_files)
                  source = ", ".join(str(path) for path in opencover_files)

          if percent is None:
              print("Coverage report was not found or could not be parsed.")
              sys.exit(1)

          print(f"Parsed line coverage: {percent:.2f}%")
          print(f"Coverage source: {source}")

          if percent < threshold:
              print(f"Coverage is below {threshold:.0f}% minimum.")
              sys.exit(1)

          print(f"Coverage meets the {threshold:.0f}% minimum.")
          PY
